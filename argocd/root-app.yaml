# App-of-apps root. Apply this once and Argo CD manages everything else from
# argocd/apps/. Set ${GIT_REPO_URL} to this repo's URL (the Makefile renders it).
#
#   GIT_REPO_URL=https://github.com/you/k8s_deploy.git \
#     envsubst < argocd/root-app.yaml | kubectl apply -n argocd -f -
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: ${GIT_REPO_URL}
    targetRevision: main
    path: argocd/apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
