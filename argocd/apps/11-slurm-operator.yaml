apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: slurm-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: slinky
  sources:
    - repoURL: ghcr.io/slinkyproject/charts
      chart: slurm-operator
      targetRevision: 1.0.2
      helm:
        valueFiles:
          - $values/slurm/operator-values.yaml
    - repoURL: REPLACE_WITH_GIT_REPO_URL
      targetRevision: main
      ref: values
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
