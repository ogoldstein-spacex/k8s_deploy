# Pin chart versions to match what you tested. Update targetRevision as needed.
# OCI helm repos must be registered once (see argocd/README.md).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  sources:
    - repoURL: quay.io/jetstack/charts
      chart: cert-manager
      targetRevision: v1.16.2
      helm:
        valueFiles:
          - $values/bootstrap/cert-manager-values.yaml
    - repoURL: REPLACE_WITH_GIT_REPO_URL
      targetRevision: main
      ref: values
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
