# Values for the slurm-operator chart (oci://ghcr.io/slinkyproject/charts/slurm-operator).
# Field names verified against the released chart (v1.1.x):
#   - `operator` supports affinity/tolerations/resources (NO nodeSelector key)
#   - `webhook` supports nodeSelector
#   - CRDs are installed by the separate slurm-operator-crds chart (crds.enabled
#     stays false here)
#   - certManager.enabled defaults to true (cert-manager must be installed first)
operator:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
  # Keep the controller off GPU nodes (operator has no nodeSelector field).
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: ml-pool
                operator: In
                values: ["system"]

webhook:
  replicas: 1
  nodeSelector:
    ml-pool: system

certManager:
  enabled: true
