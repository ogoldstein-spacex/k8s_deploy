# 2-node NCCL all-reduce over GPUDirect-RDMA (A3 Ultra / H200).
#
# Run this BEFORE deploying Slurm to prove the RDMA fabric end-to-end. It uses
# Google's GIB diagnostic image and the same multi-network annotations + host
# mounts that the Slurm NodeSet will use, so a green run here means Slurm will
# work too.
#
# Prereqs (handled by `make nccl-test`):
#   1. GKE network objects applied      (bootstrap/gke-network-objects.yaml.tmpl)
#   2. NCCL GIB installer DaemonSet      (bootstrap step 2)
#   3. JobSet controller installed       (registry.k8s.io/jobset)
#   4. >= 2 nodes available in the gpu-rdma pool (scale it up; this costs money)
#
# Watch: kubectl logs -f jobs/nccl-allreduce-worker-0
# A healthy H200 run reaches ~190+ GB/s busbw at large message sizes.
#
# If pods stay "SchedulingGated", your cluster lacks GKE topology-aware auto
# scheduling; delete the `schedulingGates` block below and re-apply.
apiVersion: jobset.x-k8s.io/v1alpha2
kind: JobSet
metadata:
  name: nccl-allreduce
spec:
  ttlSecondsAfterFinished: 1200
  suspend: false
  network:
    enableDNSHostnames: true
  replicatedJobs:
    - name: worker
      template:
        spec:
          parallelism: 2 # NUM_NODES
          completions: 2 # NUM_NODES
          template:
            metadata:
              annotations:
                networking.gke.io/default-interface: "eth0"
                networking.gke.io/interfaces: |
                  [
                    {"interfaceName":"eth0","network":"default"},
                    {"interfaceName":"eth2","network":"rdma-0"},
                    {"interfaceName":"eth3","network":"rdma-1"},
                    {"interfaceName":"eth4","network":"rdma-2"},
                    {"interfaceName":"eth5","network":"rdma-3"},
                    {"interfaceName":"eth6","network":"rdma-4"},
                    {"interfaceName":"eth7","network":"rdma-5"},
                    {"interfaceName":"eth8","network":"rdma-6"},
                    {"interfaceName":"eth9","network":"rdma-7"}
                  ]
            spec:
              activeDeadlineSeconds: 3600
              restartPolicy: Never
              nodeSelector:
                cloud.google.com/gke-accelerator: nvidia-h200-141gb
              tolerations:
                - key: cloud.google.com/gke-queued
                  effect: NoSchedule
                  value: "true"
                - key: "nvidia.com/gpu"
                  operator: "Exists"
                  effect: "NoSchedule"
              setHostnameAsFQDN: true
              volumes:
                - name: gib
                  hostPath:
                    path: /home/kubernetes/bin/gib
                - name: nvidia
                  hostPath:
                    path: /home/kubernetes/bin/nvidia
                - name: shared-memory
                  emptyDir:
                    medium: "Memory"
                    sizeLimit: 250Gi
              schedulingGates:
                - name: "gke.io/topology-aware-auto-nccl-test"
              containers:
                - name: nccl-test
                  stdin: true
                  tty: true
                  image: us-docker.pkg.dev/gce-ai-infra/gpudirect-gib/nccl-plugin-gib-diagnostic:v1.0.6
                  securityContext:
                    privileged: true
                  env:
                    - name: MY_NODE_NAME
                      valueFrom:
                        fieldRef:
                          fieldPath: spec.nodeName
                    - name: OMPI_ALLOW_RUN_AS_ROOT
                      value: "1"
                    - name: OMPI_ALLOW_RUN_AS_ROOT_CONFIRM
                      value: "1"
                    - name: N_NODES
                      value: "2"
                    - name: LD_LIBRARY_PATH
                      value: /usr/local/nvidia/lib64
                  command:
                    - bash
                    - -c
                    - |
                      set -x
                      echo "Starting NCCL all-reduce on ${MY_NODE_NAME} across ${N_NODES} nodes"
                      apt update -y && apt install -y iputils-ping

                      # Start sshd for mpirun fan-out
                      /scripts/container_entry.sh daemon &

                      export POSTFIX=$(hostname | cut -d . -f 2-)
                      export WORKERS_BASENAME=$(hostname | cut -d . -f 1 | rev | cut -d - -f 2- | rev )
                      export NODE_RANK=$JOB_COMPLETION_INDEX

                      for i in $(seq 0 $(($N_NODES-1))); do
                        OTHER=${WORKERS_BASENAME}-${i}.${POSTFIX}
                        until ssh -p 222 -o StrictHostKeyChecking=no $OTHER hostname; do
                          echo "Waiting for ${OTHER}..."
                          sleep 10
                        done
                        echo "${OTHER} port=222 slots=8" | tee -a /tmp/hostfile
                      done
                      cat /tmp/hostfile

                      if [[ "${NODE_RANK}" -eq "0" ]]; then
                        export NCCL_TESTS_SPLIT_MASK="0x0"
                        export NCCL_NET=gIB
                        source /usr/local/gib/scripts/set_nccl_env.sh
                        ENV_VARS=$(echo ${!NCCL*} ${!OMPI*} LD_LIBRARY_PATH PATH | sed 's/ / -x /g')

                        mpirun --hostfile /tmp/hostfile \
                          -x $ENV_VARS \
                          -mca plm_rsh_no_tree_spawn 1 \
                          --mca orte_keep_fqdn_hostnames 1 \
                          --mca btl self,tcp \
                          --mca btl_tcp_if_include eth0 \
                          --bind-to none \
                          --mca plm_rsh_agent "ssh -q -o LogLevel=ERROR -o StrictHostKeyChecking=no -p 222" \
                          /third_party/nccl-tests/build/all_reduce_perf -b 1K -e 8G -f 2 -g 1 -w 5 --iters 100 -c 1
                      else
                        while ping -c 1 ${WORKERS_BASENAME}-0.${POSTFIX}; do
                          sleep 5
                        done
                      fi
                      exit 0
                  volumeMounts:
                    - name: nvidia
                      mountPath: /usr/local/nvidia
                    - name: gib
                      mountPath: /usr/local/gib
                    - name: shared-memory
                      mountPath: /dev/shm
                  resources:
                    limits:
                      nvidia.com/gpu: 8
                    requests:
                      nvidia.com/gpu: 8
              restartPolicy: Never
